name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tooling:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Compile Python tools
        shell: pwsh
        run: |
          $scripts = @(Get-ChildItem .\starwind-vanilla-compat\tools -Filter *.py -File)
          foreach ($script in $scripts) {
            python -m py_compile $script.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Parse PowerShell tools
        shell: pwsh
        run: |
          $scripts = @(
            Get-ChildItem .\starwind-vanilla-compat\tools -Filter *.ps1 -File
            Get-ChildItem .\release -Filter *.ps1 -File
          )
          foreach ($script in $scripts) {
            [void][ScriptBlock]::Create((Get-Content -LiteralPath $script.FullName -Raw))
            Write-Host "Parsed $($script.FullName)"
          }

      - name: Verify release inputs
        shell: pwsh
        run: |
          $required = @(
            '.\release\Apply-Fetcher-Starwind-CompatibilityPatch.ps1'
            '.\release\Build-FetcherStarwindPatch.ps1'
            '.\release\PATCH_VERSION.txt'
            '.\release\Publish-FetcherStarwindPatch.ps1'
            '.\release\Publish-StableGitHubRelease.ps1'
            '.\release\StarwindMusicCells.lua'
            '.\release\StarwindMusicRouter.lua'
            '.\starwind-vanilla-compat\build\Data Files\StarwindRemasteredV1.15.esm'
            '.\starwind-vanilla-compat\build\Data Files\StarwindRemasteredPatch.esm'
            '.\starwind-vanilla-compat\reports\morrowind-local-assets.json'
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Required release input is missing: $path"
            }
          }

          $patchVersion = (Get-Content -LiteralPath '.\release\PATCH_VERSION.txt' -Raw).Trim()
          if ($patchVersion -notmatch '^\d+\.\d+\.\d+$') {
            throw "release/PATCH_VERSION.txt must use major.minor.patch format: $patchVersion"
          }

          $localManifest = Get-Content -LiteralPath '.\starwind-vanilla-compat\reports\morrowind-local-assets.json' -Raw | ConvertFrom-Json
          if ([int]$localManifest.schemaVersion -ne 1 -or
              [string]$localManifest.manifestId -ne 'fetcher-starwind-local-morrowind-assets') {
            throw 'The tracked local Morrowind asset manifest is unsupported.'
          }
          $localFiles = @($localManifest.files)
          if ($localFiles.Count -eq 0) {
            throw 'The tracked local Morrowind asset manifest contains no file recipes.'
          }
          $destinations = @($localFiles | ForEach-Object { ([string]$_.destinationPath).ToLowerInvariant() })
          if (@($destinations | Sort-Object -Unique).Count -ne $destinations.Count) {
            throw 'The tracked local Morrowind asset manifest contains duplicate destinations.'
          }
          $rewriteCount = @($localFiles | Where-Object operation -eq 'rewriteNifTexturePaths').Count
          if ($rewriteCount -eq 0) {
            throw 'The tracked local Morrowind asset manifest contains no NIF rewrite recipes.'
          }

          Write-Host "Validated patch version $patchVersion and $($localFiles.Count) local Morrowind reconstruction recipes."
